     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaStore | Amazon Style</title>
    <!-- Tailwind CSS for Professional UI -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .amazon-bg { background-color: #131921; }
        .amazon-yellow { background-color: #f0c14b; border-color: #a88734 #9c7e31 #846a29; }
        .amazon-yellow:hover { background-color: #ddb347; }
    </style>
</head>
<body class="bg-gray-100 font-sans antsialiased">

    <!-- NAVIGATION BAR -->
    <header class="sticky top-0 z-50">
        <!-- Top Nav -->
        <div class="amazon-bg text-white px-4 py-2 flex items-center justify-between gap-4">
            <!-- Logo -->
            <div class="text-2xl font-bold tracking-wider cursor-pointer" onclick="filterCategory('All')">
                Mega<span class="text-amber-500">Store</span>
            </div>

            <!-- Search Bar -->
            <div class="flex flex-1 max-w-2xl mx-4">
                <input type="text" id="searchInput" oninput="searchProducts()" placeholder="Search 100+ products..." class="w-full px-4 py-2 text-black rounded-l-md focus:outline-none">
                <button class="bg-amber-500 text-slate-900 px-6 rounded-r-md hover:bg-amber-600 transition">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- Cart Icon -->
            <div class="relative cursor-pointer flex items-center gap-2 p-2 border border-transparent hover:border-white rounded" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-2xl text-amber-500"></i>
                <span class="hidden md:inline font-semibold">Cart</span>
                <span id="cartCount" class="absolute -top-1 left-6 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </div>
        </div>

        <!-- Categories Ribbon -->
        <div class="bg-slate-700 text-white px-4 py-1.5 flex gap-4 text-sm overflow-x-auto no-scrollbar">
            <button onclick="filterCategory('All')" class="hover:text-amber-400 whitespace-nowrap font-medium">All Products</button>
            <button onclick="filterCategory('Electronics')" class="hover:text-amber-400 whitespace-nowrap">Electronics</button>
            <button onclick="filterCategory('Fashion')" class="hover:text-amber-400 whitespace-nowrap">Fashion</button>
            <button onclick="filterCategory('Home & Kitchen')" class="hover:text-amber-400 whitespace-nowrap">Home & Kitchen</button>
            <button onclick="filterCategory('Books')" class="hover:text-amber-400 whitespace-nowrap">Books</button>
            <button onclick="filterCategory('Fitness')" class="hover:text-amber-400 whitespace-nowrap">Fitness</button>
        </div>
    </header>

    <!-- HERO BANNER -->
    <div class="bg-gradient-to-b from-amber-100 to-gray-100 py-8 px-4 text-center border-b border-gray-200">
        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800">Welcome to MegaStore Super Sale</h1>
        <p class="text-gray-600 mt-2 text-sm md:text-base">Explore 100 premium products with instant WhatsApp checkout!</p>
    </div>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Products Grid -->
        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            <!-- Products will be injected by JavaScript -->
        </div>
    </main>

    <!-- CART SIDEBAR -->
    <div id="cartSidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="amazon-bg text-white p-4 flex justify-between items-center">
            <h2 class="text-xl font-bold"><i class="fa-solid fa-cart-shopping mr-2"></i>Shopping Cart</h2>
            <button onclick="toggleCart()" class="text-white hover:text-gray-300 text-2xl">&times;</button>
        </div>
        
        <!-- Cart Items List -->
        <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Cart items injected here -->
        </div>

        <!-- Cart Footer -->
        <div class="p-4 border-t border-gray-200 bg-gray-50">
            <div class="flex justify-between text-lg font-bold mb-4">
                <span>Total Amount:</span>
                <span id="cartTotal">₹0</span>
            </div>
            <button onclick="checkoutViaWhatsApp()" class="w-full amazon-yellow text-slate-900 py-3 rounded-lg font-semibold shadow md:hover:shadow-lg transition flex items-center justify-center gap-2 text-base border">
                <i class="fa-brands fa-whatsapp text-xl text-green-600"></i> Order via WhatsApp
            </button>
        </div>
    </div>

    <!-- JAVASCRIPT FOR DYNAMIC 100 PRODUCTS & LOGIC -->
    <script>
        // WhatsApp Configuration
        const WHATSAPP_NUMBER = "917296019690"; // Apna 10-digit WhatsApp number country code ke sath yahan dalein

        // Category wise configuration to generate 100 distinct products
        const categories = ["Electronics", "Fashion", "Home & Kitchen", "Books", "Fitness"];
        const products = [];

        // Generating 100 realistic mock products dynamically
        let idCounter = 1;
        categories.forEach(cat => {
            for(let i = 1; i <= 20; i++) {
                let price = Math.floor(Math.random() * 4500) + 299; // Random price between 299 and 4799
                let rating = (Math.random() * (5 - 3.8) + 3.8).toFixed(1);
                let imageId = idCounter + 10; // Unsplash unique image identifier

                products.push({
                    id: idCounter,
                    title: `${cat} Premium Item #${i}`,
                    category: cat,
                    price: price,
                    rating: rating,
                    image: `https://picsum.photos/id/${imageId}/300/300` // Reliable free dynamic images
                });
                idCounter++;
            }
        });

        let cart = [];
        let currentCategory = "All";
        let searchQuery = "";

        // Function to Render Products to UI
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = "";

            const filtered = products.filter(p => {
                const matchesCategory = currentCategory === "All" || p.category === currentCategory;
                const matchesSearch = p.title.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500 text-lg">No products found matching your search.</div>`;
                return;
            }

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white p-3 rounded shadow-sm border border-gray-200 flex flex-col justify-between hover:shadow-md transition">
                        <div>
                            <div class="w-full h-40 bg-gray-100 rounded overflow-hidden mb-3">
                                <img src="${p.image}" alt="${p.title}" class="w-full h-full object-cover">
                            </div>
                            <span class="text-xs text-gray-500 uppercase tracking-wider">${p.category}</span>
                            <h3 class="text-sm font-semibold text-gray-800 line-clamp-2 mt-1 min-h-[40px]">${p.title}</h3>
                            <div class="flex items-center my-1.5 text-amber-500 text-xs">
                                <i class="fa-solid fa-star"></i> <span class="text-gray-600 ml-1">${p.rating} (50+)</span>
                            </div>
                        </div>
                        <div>
                            <div class="text-lg font-bold text-slate-900 mb-2">₹${p.price.toLocaleString('en-IN')}</div>
                            <button onclick="addToCart(${p.id})" class="w-full text-xs amazon-yellow text-slate-900 py-1.5 px-2 rounded border transition font-medium cursor-pointer">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Search & Filter Logics
        function searchProducts() {
            searchQuery = document.getElementById('searchInput').value;
            renderProducts();
        }

        function filterCategory(cat) {
            currentCategory = cat;
            renderProducts();
        }

        // Cart Actions
        function toggleCart() {
            const sidebar = document.getElementById('cartSidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);

            if(existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(p => p.id === productId);
            if(!item) return;

            item.quantity += change;
            if(item.quantity <= 0) {
                cart = cart.filter(p => p.id !== productId);
            }
            updateCartUI();
        }

        function updateCartUI() {
            // Count
            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            document.getElementById('cartCount').innerText = totalItems;

            // List
            const cartItemsContainer = document.getElementById('cartItems');
            cartItemsContainer.innerHTML = "";

            let totalPrice = 0;

            if(cart.length === 0) {
                cartItemsContainer.innerHTML = `<div class="text-center text-gray-400 py-8">Your cart is empty</div>`;
            } else {
                cart.forEach(item => {
                    totalPrice += item.price * item.quantity;
                    cartItemsContainer.innerHTML += `
                        <div class="flex items-center justify-between border-b border-gray-100 pb-3">
                            <div class="flex items-center gap-3">
                                <img src="${item.image}" class="w-12 h-12 object-cover rounded">
                                <div>
                                    <h4 class="text-sm font-semibold text-gray-800 line-clamp-1">${item.title}</h4>
                                    <p class="text-xs text-gray-500">₹${item.price} x ${item.quantity}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="updateQuantity(${item.id}, -1)" class="bg-gray-200 text-gray-800 px-2 py-0.5 rounded text-sm font-bold">-</button>
                                <span class="font-medium text-sm">${item.quantity}</span>
                                <button onclick="updateQuantity(${item.id}, 1)" class="bg-gray-200 text-gray-800 px-2 py-0.5 rounded text-sm font-bold">+</button>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('cartTotal').innerText = `₹${totalPrice.toLocaleString('en-IN')}`;
        }

        // Checkout & WhatsApp Message Generator
        function checkoutViaWhatsApp() {
            if(cart.length === 0) {
                alert("Aapka cart khali hai!");
                return;
            }

            let message = `*New Order Received from MegaStore*\n`;
            message += `-----------------------------------\n`;
            
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.title}*\n`;
                message += `   Qty: ${item.quantity} | Price: ₹${item.price * item.quantity}\n`;
            });

            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            message += `-----------------------------------\n`;
            message += `*Total Payable Amount: ₹${total.toLocaleString('en-IN')}*\n\n`;
            message += `Please confirm my order.`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');
        }

        // Initial Load
        renderProducts();
    </script>
</body>
</html>
